<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard FGR</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  :root{
    --bg:        #101116;
    --bg-raise:  #16171F;
    --surface:   #1B1C25;
    --surface-2: #21222C;
    --border:    #2B2C38;
    --text:      #EDEDF2;
    --text-soft: #A6A7B8;
    --text-mute: #6C6D80;
    --accent:    #7C6CF0;
    --accent-soft: rgba(124,108,240,.16);
    --good:      #3FBE73;
    --good-soft: rgba(63,190,115,.14);
    --warning:   #E0A93E;
    --warning-soft: rgba(224,169,62,.14);
    --critical:  #E5615A;
    --critical-soft: rgba(229,97,90,.14);
    --radius: 10px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); }
  body{
    font-family: -apple-system,system-ui,"Segoe UI","Helvetica Neue",Arial,sans-serif;
    font-size:13.5px; line-height:1.5;
  }
  .num{ font-variant-numeric: tabular-nums; font-feature-settings:"tnum"; }
  #app{ padding:20px 22px 60px; max-width:1180px; margin:0 auto; }

  .state-box{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:80px 20px; color:var(--text-soft); }
  .spinner{ width:26px; height:26px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){ .spinner{ animation-duration: 2s; } }

  button.btn{
    background:var(--accent); color:#fff; border:none; padding:9px 18px;
    border-radius:8px; font-size:13.5px; font-weight:600; cursor:pointer;
  }
  button.btn:hover{ filter:brightness(1.08); }
  button.btn.ghost{ background:transparent; border:1px solid var(--border); color:var(--text-soft); }

  .topbar{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
  .titlewrap h1{ font-size:18px; margin:0 0 2px; letter-spacing:-.01em; }
  .titlewrap .sub{ color:var(--text-soft); font-size:12.5px; }
  .health-pill{ display:inline-flex; align-items:center; gap:7px; padding:6px 12px; border-radius:20px; font-weight:600; font-size:12.5px; }
  .health-pill .dot{ width:8px; height:8px; border-radius:50%; }
  .health-good{ background:var(--good-soft); color:var(--good); }
  .health-warning{ background:var(--warning-soft); color:var(--warning); }
  .health-critical{ background:var(--critical-soft); color:var(--critical); }
  .health-unknown{ background:var(--surface-2); color:var(--text-mute); }
  .health-good .dot{ background:var(--good); }
  .health-warning .dot{ background:var(--warning); }
  .health-critical .dot{ background:var(--critical); }
  .health-unknown .dot{ background:var(--text-mute); }

  .grid{ display:grid; gap:14px; }
  .grid.cols-2{ grid-template-columns:1fr 1fr; }
  .grid.cols-3{ grid-template-columns:repeat(3,1fr); }
  .grid.cols-6{ grid-template-columns:repeat(6,1fr); }
  @media (max-width:900px){ .grid.cols-2, .grid.cols-3, .grid.cols-6{ grid-template-columns:repeat(2,1fr); } }

  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
  .card h2{ font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-soft); margin:0 0 12px; font-weight:600; }
  .card h2 .hint{ text-transform:none; letter-spacing:0; color:var(--text-mute); font-weight:400; margin-left:6px; }

  .hero-progress{ display:flex; align-items:center; gap:22px; }
  .hero-progress .pct{ font-size:42px; font-weight:700; letter-spacing:-.02em; }
  .hero-progress .track{ flex:1; height:12px; background:var(--surface-2); border-radius:6px; overflow:hidden; }
  .hero-progress .fill{ height:100%; background:linear-gradient(90deg, var(--accent), #A08CF5); border-radius:6px; }

  .kpi{ text-align:left; }
  .kpi .v{ font-size:24px; font-weight:700; }
  .kpi .l{ font-size:11.5px; color:var(--text-soft); margin-top:4px; }

  .row{ display:flex; align-items:center; gap:10px; padding:7px 0; border-top:1px solid var(--border); }
  .row:first-child{ border-top:none; }
  .row .name{ width:130px; flex:none; font-size:12.5px; color:var(--text-soft); }
  .row .track{ flex:1; height:8px; background:var(--surface-2); border-radius:4px; overflow:hidden; }
  .row .fill{ height:100%; background:var(--accent); border-radius:4px; }
  .row .val{ width:44px; flex:none; text-align:right; font-weight:600; font-size:12.5px; }

  .badge{ display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; }
  .badge.good{ background:var(--good-soft); color:var(--good); }
  .badge.warning{ background:var(--warning-soft); color:var(--warning); }
  .badge.critical{ background:var(--critical-soft); color:var(--critical); }
  .badge.mute{ background:var(--surface-2); color:var(--text-mute); }

  table{ width:100%; border-collapse:collapse; }
  th{ text-align:left; font-size:10.5px; text-transform:uppercase; color:var(--text-mute); padding:6px 8px; border-bottom:1px solid var(--border); font-weight:600; }
  td{ padding:8px 8px; border-bottom:1px solid var(--border); font-size:12.5px; }
  tr:last-child td{ border-bottom:none; }
  .empty{ color:var(--text-mute); font-size:12.5px; padding:14px 0; text-align:center; }

  .settings-form{ display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .settings-form label{ display:flex; flex-direction:column; gap:5px; font-size:11.5px; color:var(--text-soft); }
  .settings-form input{ background:var(--surface-2); border:1px solid var(--border); color:var(--text); padding:7px 9px; border-radius:6px; font-size:13px; }

  .bottleneck{ display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-top:1px solid var(--border); }
  .bottleneck:first-child{ border-top:none; }
  .bottleneck .name{ font-weight:600; font-size:13px; }
  .bottleneck .desc{ font-size:11.5px; color:var(--text-soft); }
  .bottleneck .count{ font-size:18px; font-weight:700; color:var(--critical); }

  footer{ margin-top:26px; padding-top:14px; border-top:1px solid var(--border); font-size:11px; color:var(--text-mute); display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px; }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }
</style>
</head>
<body>
<div id="app">
  <div class="state-box" id="loading"><div class="spinner"></div><div>Carregando dados do board…</div></div>
</div>

<script>
var t = TrelloPowerUp.iframe();
var KEY = 'ebdf1a3d948d7b795b6ffa7ae1dd4292';
var app = document.getElementById('app');

function esc(s){
  return (s==null?'':String(s)).replace(/[&<>"]/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];
  });
}
function fmtPct(n){ return (Math.round(n*10)/10).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%'; }
function fmtNum(n){ return (Math.round(n*10)/10).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}); }

function parseYamlBlock(desc){
  var out = {};
  if(!desc) return out;
  var m = desc.match(/```yaml([\s\S]*?)```/);
  var body = m ? m[1] : desc;
  body.split('\n').forEach(function(line){
    var idx = line.indexOf(':');
    if(idx === -1) return;
    var key = line.slice(0, idx).trim();
    var val = line.slice(idx+1).trim();
    if(!key) return;
    out[key] = val;
  });
  return out;
}

function trelloGet(path, token){
  var sep = path.indexOf('?') > -1 ? '&' : '?';
  return fetch('https://api.trello.com/1' + path + sep + 'key=' + KEY + '&token=' + token)
    .then(function(r){ if(!r.ok) throw new Error('Trello API ' + r.status); return r.json(); });
}

function ensureAuthorized(){
  return t.getRestApi().isAuthorized().then(function(isAuth){
    if (isAuth) return t.getRestApi().getToken();
    return t.getRestApi().authorize({ scope: 'read', expiration: '30days' })
      .then(function(){ return t.getRestApi().getToken(); });
  });
}

function renderAuthGate(){
  app.innerHTML =
    '<div class="state-box">' +
      '<div style="font-size:32px;">📊</div>' +
      '<div><b>Conecte o Dashboard FGR ao seu board</b></div>' +
      '<div style="color:var(--text-mute);max-width:340px;text-align:center;">' +
        'Precisamos da sua autorização de leitura para calcular o progresso ponderado a partir dos cartões deste board.' +
      '</div>' +
      '<button class="btn" id="connectBtn">Conectar ao Trello</button>' +
    '</div>';
  document.getElementById('connectBtn').onclick = function(){ boot(); };
}

function renderError(err){
  app.innerHTML =
    '<div class="state-box">' +
      '<div style="font-size:28px;">⚠️</div>' +
      '<div><b>Não foi possível carregar o dashboard</b></div>' +
      '<div style="color:var(--text-mute);max-width:360px;text-align:center;">' + esc(err.message || String(err)) + '</div>' +
      '<button class="btn ghost" id="retryBtn">Tentar novamente</button>' +
    '</div>';
  document.getElementById('retryBtn').onclick = function(){ boot(); };
}

function buildItems(cards, listName, labelName, memberName){
  return cards.map(function(c){
    var y = parseYamlBlock(c.desc);
    var disciplina = (y.disciplina && y.disciplina.trim()) ||
      (c.idLabels && c.idLabels[0] ? labelName[c.idLabels[0]] : 'Sem disciplina');
    var pesoRaw = (y.peso || '').replace(',', '.').trim();
    var peso = parseFloat(pesoRaw) || 0;
    return {
      id: c.id,
      name: c.name,
      list: listName[c.idList] || '—',
      disciplina: disciplina,
      peso: peso,
      prioridade: (y.prioridade || '').trim(),
      due: c.due,
      members: (c.idMembers || []).map(function(id){ return memberName[id]; }).filter(Boolean),
      dataPrevista: (y.data_prevista || '').trim()
    };
  });
}

function healthOf(pctPonderado, cfg, blockedCount){
  if (!cfg || !cfg.prazoMeses || !cfg.dataInicio) {
    return { level: 'unknown', label: 'Configure o prazo', gap: null, elapsedPct: null };
  }
  var start = new Date(cfg.dataInicio + 'T00:00:00');
  var now = new Date();
  var totalDays = Number(cfg.prazoMeses) * 30;
  var elapsedDays = Math.max(0, (now - start) / 86400000);
  var elapsedPct = Math.min(100, elapsedDays / totalDays * 100);
  var gap = elapsedPct - pctPonderado;
  var level = 'good';
  if (gap > 15 || blockedCount >= 2) level = 'critical';
  else if (gap > 5 || blockedCount >= 1) level = 'warning';
  var labels = { good: 'Saudável', warning: 'Atenção', critical: 'Crítico' };
  return { level: level, label: labels[level], gap: gap, elapsedPct: elapsedPct };
}

var CANON_ORDER = ['Topografia','Ambiental','Area Institucional','Urbanismo','AVTO','Sondagens','Infraestrutura','Comercial','Administracao/Cliente'];

function diasRestantes(cfg){
  if (!cfg || !cfg.prazoMeses || !cfg.dataInicio) return null;
  var start = new Date(cfg.dataInicio + 'T00:00:00');
  var totalDays = Number(cfg.prazoMeses) * 30;
  var elapsedDays = Math.max(0, (new Date() - start) / 86400000);
  return Math.max(0, Math.round(totalDays - elapsedDays));
}

function render(items, cfg, history, boardName){
  var totalPeso = items.reduce(function(s,i){ return s + i.peso; }, 0) || 1;
  var doneItems = items.filter(function(i){ return i.list === 'Concluido' || i.list === 'Concluído'; });
  var pesoDone = doneItems.reduce(function(s,i){ return s + i.peso; }, 0);
  var pct = pesoDone / totalPeso * 100;

  var byList = {};
  items.forEach(function(i){ byList[i.list] = (byList[i.list] || 0) + 1; });
  var LNAMES = ['Backlog','Em andamento','Bloqueado','Em aprovacao externa','Concluido'];
  var LLABEL = {'Backlog':'Backlog','Em andamento':'Em andamento','Bloqueado':'Bloqueado','Em aprovacao externa':'Aprovação externa','Concluido':'Concluído'};

  var byDisc = {};
  items.forEach(function(i){
    if(!byDisc[i.disciplina]) byDisc[i.disciplina] = { total:0, done:0 };
    byDisc[i.disciplina].total += i.peso;
    if (i.list === 'Concluido') byDisc[i.disciplina].done += i.peso;
  });
  var discRows = Object.keys(byDisc).map(function(k){
    var d = byDisc[k];
    return { name:k, pct: d.total ? d.done/d.total*100 : 0, peso: d.total };
  }).sort(function(a,b){ return b.pct - a.pct; });

  var blocked = items.filter(function(i){ return i.list === 'Bloqueado'; });
  var waitingExternal = items.filter(function(i){ return i.list === 'Em aprovacao externa'; });

  var bottlenecksByDisc = {};
  blocked.concat(waitingExternal).forEach(function(i){
    if(!bottlenecksByDisc[i.disciplina]) bottlenecksByDisc[i.disciplina] = { count:0, peso:0 };
    bottlenecksByDisc[i.disciplina].count++;
    bottlenecksByDisc[i.disciplina].peso += i.peso;
  });
  var bottlenecks = Object.keys(bottlenecksByDisc).map(function(k){
    return { name:k, count:bottlenecksByDisc[k].count, peso:bottlenecksByDisc[k].peso };
  }).sort(function(a,b){ return b.peso - a.peso; });

  var health = healthOf(pct, cfg, blocked.length);
  var restantes = diasRestantes(cfg);

  var withDue = items.filter(function(i){ return !!i.due; }).sort(function(a,b){ return new Date(a.due) - new Date(b.due); });
  var upcoming = withDue.filter(function(i){ return i.list !== 'Concluido'; }).slice(0, 10);
  var now = new Date();
  var overdue = withDue.filter(function(i){ return i.list !== 'Concluido' && new Date(i.due) < now; });
  var highPriority = items.filter(function(i){ return /alta/i.test(i.prioridade); });
  var critical = { highPriority: highPriority.length, overdue: overdue.length, blocked: blocked.length };

  var byMember = {};
  items.forEach(function(i){
    i.members.forEach(function(m){ byMember[m] = (byMember[m]||0) + 1; });
  });
  var memberRows = Object.keys(byMember).map(function(k){ return {name:k, count:byMember[k]}; }).sort(function(a,b){ return b.count-a.count; });
  var maxMember = Math.max.apply(null, memberRows.map(function(r){return r.count;}).concat([1]));

  function barRows(rows, opts){
    opts = opts || {};
    if (!rows.length) return '<div class="empty">' + (opts.emptyText || 'Sem dados ainda') + '</div>';
    return rows.map(function(r){
      return '<div class="row"><div class="name" title="'+esc(r.name)+'">'+esc(r.name)+'</div>' +
        '<div class="track"><div class="fill" style="width:'+ (opts.max ? (r.value/opts.max*100) : r.pct) +'%"></div></div>' +
        '<div class="val num">'+ (opts.max ? r.value : fmtPct(r.pct)) +'</div></div>';
    }).join('');
  }

  var statusBarHtml = LNAMES.map(function(ln){
    var color = ln==='Concluido' ? 'var(--good)' : ln==='Bloqueado' ? 'var(--critical)' : ln==='Em aprovacao externa' ? 'var(--warning)' : ln==='Em andamento' ? 'var(--accent)' : 'var(--surface-2)';
    var count = byList[ln] || 0;
    return '<div class="kpi"><div class="v" style="color:'+color+'">'+count+'</div><div class="l">'+LLABEL[ln]+'</div></div>';
  }).join('');

  var histRows = (history || []).slice(-8);
  var histHtml = histRows.length ? histRows.map(function(h,idx){
    return '<div class="row"><div class="name">'+esc(h.date)+'</div>' +
      '<div class="track"><div class="fill" style="width:'+h.pct+'%"></div></div>' +
      '<div class="val num">'+fmtPct(h.pct)+'</div></div>';
  }).join('') : '<div class="empty">Histórico será construído conforme o dashboard for aberto ao longo das semanas.</div>';

  var timelineHtml = CANON_ORDER.filter(function(k){ return byDisc[k]; }).map(function(k){
    var d = byDisc[k];
    var share = d.total / totalPeso * 100;
    return '<div style="flex:0 0 '+share+'%;min-width:26px;">' +
      '<div style="height:22px;background:var(--surface-2);border-radius:4px;overflow:hidden;">' +
        '<div style="height:100%;width:'+discDonePct(d)+'%;background:var(--accent);"></div>' +
      '</div>' +
      '<div style="font-size:10px;color:var(--text-soft);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(k)+'</div>' +
    '</div>';
  }).join('<div style="width:2px;"></div>');

  function discDonePct(d){ return d.total ? (d.done/d.total*100) : 0; }

  app.innerHTML =
    '<div class="topbar">' +
      '<div class="titlewrap"><h1>Dashboard FGR</h1><div class="sub">Progresso ponderado calculado a partir de '+items.length+' entregas deste board</div></div>' +
      '<div class="health-pill health-'+health.level+'"><span class="dot"></span>'+health.label+(health.gap!=null ? ' · gap '+fmtNum(health.gap)+' p.p.' : '')+'</div>' +
    '</div>' +

    '<div class="card" style="margin-bottom:14px;">' +
      '<h2>Resumo executivo</h2>' +
      '<div class="grid cols-6">' +
        '<div class="kpi"><div class="v" style="font-size:15px;">'+esc(boardName||'—')+'</div><div class="l">Empreendimento</div></div>' +
        '<div class="kpi"><div class="v" style="font-size:15px;">'+esc((cfg&&cfg.cliente)||'—')+'</div><div class="l">Cliente</div></div>' +
        '<div class="kpi"><div class="v" style="font-size:15px;">'+esc((cfg&&cfg.responsavel)||'—')+'</div><div class="l">Responsável</div></div>' +
        '<div class="kpi"><div class="v num">'+ (cfg&&cfg.prazoMeses ? cfg.prazoMeses+'m' : '—') +'</div><div class="l">Prazo</div></div>' +
        '<div class="kpi"><div class="v num">'+ (restantes!=null ? restantes : '—') +'</div><div class="l">Dias restantes</div></div>' +
        '<div class="kpi"><div class="v num" style="color:var(--good)">'+fmtPct(pct)+'</div><div class="l">Executado</div></div>' +
      '</div>' +
    '</div>' +

    '<div class="card" style="margin-bottom:14px;">' +
      '<h2>Progresso ponderado (Peso do Projeto)</h2>' +
      '<div class="hero-progress">' +
        '<div class="pct num">'+fmtPct(pct)+'</div>' +
        '<div class="track"><div class="fill" style="width:'+Math.min(100,pct)+'%"></div></div>' +
      '</div>' +
      '<div class="grid cols-3" style="margin-top:16px;">' +
        '<div class="kpi"><div class="v num">100%</div><div class="l">Peso total</div></div>' +
        '<div class="kpi"><div class="v num" style="color:var(--good)">'+fmtPct(pct)+'</div><div class="l">Executado</div></div>' +
        '<div class="kpi"><div class="v num" style="color:var(--text-soft)">'+fmtPct(100-pct)+'</div><div class="l">Restante</div></div>' +
      '</div>' +
    '</div>' +

    '<div class="grid cols-6" style="margin-bottom:14px;">' + statusBarHtml + '</div>' +

    '<div class="grid cols-2" style="margin-bottom:14px;">' +
      '<div class="card"><h2>Progresso por disciplina</h2>' + barRows(discRows.map(function(r){return {name:r.name, pct:r.pct};})) + '</div>' +
      '<div class="card"><h2>Gargalos <span class="hint">bloqueados + aguardando aprovação externa</span></h2>' +
        (bottlenecks.length ? bottlenecks.map(function(b){
          return '<div class="bottleneck"><div><div class="name">'+esc(b.name)+'</div><div class="desc">Bloqueando '+b.count+' entrega'+(b.count>1?'s':'')+' · '+fmtNum(b.peso)+' pts de peso</div></div><div class="count num">'+b.count+'</div></div>';
        }).join('') : '<div class="empty">Nenhum gargalo no momento</div>') +
      '</div>' +
    '</div>' +

    '<div class="card" style="margin-bottom:14px;">' +
      '<h2>Cronograma <span class="hint">largura = peso da disciplina · preenchido = % concluído</span></h2>' +
      '<div style="display:flex;align-items:flex-end;">' + timelineHtml + '</div>' +
    '</div>' +

    '<div class="grid cols-2" style="margin-bottom:14px;">' +
      '<div class="card"><h2>Aprovações <span class="hint">entregas em análise externa agora</span></h2>' +
        (waitingExternal.length ? '<table><thead><tr><th>Entrega</th><th>Disciplina</th><th class="num">Peso</th></tr></thead><tbody>' +
          waitingExternal.map(function(i){
            return '<tr><td>'+esc(i.name)+'</td><td>'+esc(i.disciplina)+'</td><td class="num">'+fmtNum(i.peso)+'</td></tr>';
          }).join('') + '</tbody></table>' : '<div class="empty">Nenhuma entrega aguardando aprovação externa</div>') +
      '</div>' +
      '<div class="card"><h2>Atividades críticas</h2>' +
        '<div class="grid cols-3">' +
          '<div class="kpi"><div class="v num" style="color:var(--critical)">'+critical.highPriority+'</div><div class="l">Prioridade alta</div></div>' +
          '<div class="kpi"><div class="v num" style="color:var(--critical)">'+critical.overdue+'</div><div class="l">Vencidas</div></div>' +
          '<div class="kpi"><div class="v num" style="color:var(--critical)">'+critical.blocked+'</div><div class="l">Bloqueadas</div></div>' +
        '</div>' +
        (critical.highPriority===0 && critical.overdue===0 ? '<div class="empty">Prioridade e datas ainda não preenchidas nos cartões — defina "prioridade" e due date para ativar este painel.</div>' : '') +
      '</div>' +
    '</div>' +

    '<div class="grid cols-2" style="margin-bottom:14px;">' +
      '<div class="card"><h2>Próximas entregas <span class="hint">por due date</span></h2>' +
        (upcoming.length ? '<table><thead><tr><th>Entrega</th><th>Data</th><th>Responsável</th></tr></thead><tbody>' +
          upcoming.map(function(i){
            return '<tr><td>'+esc(i.name)+'</td><td class="num">'+new Date(i.due).toLocaleDateString('pt-BR')+'</td><td>'+(i.members.length?esc(i.members.join(', ')):'—')+'</td></tr>';
          }).join('') + '</tbody></table>' : '<div class="empty">Nenhum cartão com due date definido ainda</div>') +
      '</div>' +
      '<div class="card"><h2>Responsáveis</h2>' +
        (memberRows.length ? barRows(memberRows, {max:maxMember}) : '<div class="empty">Nenhum membro atribuído aos cartões ainda</div>') +
      '</div>' +
    '</div>' +

    '<div class="grid cols-2" style="margin-bottom:14px;">' +
      '<div class="card"><h2>Evolução <span class="hint">snapshot a cada abertura do dashboard</span></h2>' + histHtml + '</div>' +
      '<div class="card"><h2>Configuração do empreendimento <span class="hint">para calcular a saúde do projeto</span></h2>' +
        '<div class="settings-form">' +
          '<label>Cliente<input type="text" id="cfgCliente" value="'+esc((cfg&&cfg.cliente)||'')+'" style="width:150px"></label>' +
          '<label>Responsável<input type="text" id="cfgResponsavel" value="'+esc((cfg&&cfg.responsavel)||'')+'" style="width:150px"></label>' +
          '<label>Prazo (meses)<input type="number" id="cfgPrazo" value="'+ (cfg && cfg.prazoMeses || '') +'" style="width:90px"></label>' +
          '<label>Data de início<input type="date" id="cfgInicio" value="'+ (cfg && cfg.dataInicio || '') +'"></label>' +
          '<button class="btn" id="cfgSave">Salvar</button>' +
        '</div>' +
        (health.elapsedPct != null ? '<div style="margin-top:12px;color:var(--text-soft)">Prazo decorrido: <b class="num">'+fmtPct(health.elapsedPct)+'</b> vs. progresso real <b class="num">'+fmtPct(pct)+'</b></div>' : '') +
      '</div>' +
    '</div>' +

    '<footer><span>Dados lidos ao vivo do board via Trello REST API.</span><span>Atualizado agora</span></footer>';

  document.getElementById('cfgSave').onclick = function(){
    var cfgOut = {
      cliente: document.getElementById('cfgCliente').value,
      responsavel: document.getElementById('cfgResponsavel').value,
      prazoMeses: document.getElementById('cfgPrazo').value,
      dataInicio: document.getElementById('cfgInicio').value
    };
    t.set('board', 'shared', 'fgrConfig', cfgOut).then(function(){
      boot();
    });
  };
}

function saveHistorySnapshot(pct){
  return t.get('board', 'shared', 'fgrProgressHistory').then(function(hist){
    hist = hist || [];
    var today = new Date().toISOString().slice(0,10);
    if (!hist.length || hist[hist.length-1].date !== today) {
      hist.push({ date: today, pct: Math.round(pct*10)/10 });
      hist = hist.slice(-12);
      return t.set('board', 'shared', 'fgrProgressHistory', hist).then(function(){ return hist; });
    }
    hist[hist.length-1].pct = Math.round(pct*10)/10;
    return t.set('board', 'shared', 'fgrProgressHistory', hist).then(function(){ return hist; });
  });
}

function boot(){
  app.innerHTML = '<div class="state-box"><div class="spinner"></div><div>Carregando dados do board…</div></div>';

  t.getRestApi().isAuthorized().then(function(isAuth){
    if (!isAuth) { renderAuthGate(); return; }

    var token, boardId, boardName;
    ensureAuthorized()
      .then(function(tok){
        token = tok;
        return t.board('id', 'name');
      })
      .then(function(board){
        boardId = board.id;
        boardName = board.name;
        return Promise.all([
          trelloGet('/boards/' + boardId + '/cards?fields=name,idList,idLabels,idMembers,due,desc', token),
          trelloGet('/boards/' + boardId + '/lists?fields=name', token),
          trelloGet('/boards/' + boardId + '/labels?fields=name', token),
          trelloGet('/boards/' + boardId + '/members?fields=fullName,username', token),
          t.get('board', 'shared', 'fgrConfig'),
          t.get('board', 'shared', 'fgrProgressHistory')
        ]);
      })
      .then(function(results){
        var cards = results[0], lists = results[1], labels = results[2], members = results[3];
        var cfg = results[4] || null;
        var listName = {}; lists.forEach(function(l){ listName[l.id] = l.name; });
        var labelName = {}; labels.forEach(function(l){ labelName[l.id] = l.name; });
        var memberName = {}; members.forEach(function(m){ memberName[m.id] = m.fullName || m.username; });

        var items = buildItems(cards, listName, labelName, memberName);
        var totalPeso = items.reduce(function(s,i){ return s + i.peso; }, 0) || 1;
        var pesoDone = items.filter(function(i){ return i.list === 'Concluido'; }).reduce(function(s,i){ return s + i.peso; }, 0);
        var pct = pesoDone / totalPeso * 100;

        saveHistorySnapshot(pct).then(function(hist){
          render(items, cfg, hist, boardName);
        });
      })
      .catch(function(err){ renderError(err); });
  });
}

t.render(function(){ boot(); });
</script>
</body>
</html>

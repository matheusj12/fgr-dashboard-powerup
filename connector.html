<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
  var ICON = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">' +
    '<rect x="1" y="9" width="3" height="6" fill="white"/>' +
    '<rect x="6.5" y="4" width="3" height="11" fill="white"/>' +
    '<rect x="12" y="1" width="3" height="14" fill="white"/>' +
    '</svg>'
  );

  TrelloPowerUp.initialize({
    'board-buttons': function (t, options) {
      return [{
        icon: ICON,
        text: 'Dashboard FGR',
        callback: function (t) {
          return t.modal({
            title: 'Dashboard FGR — Progresso do Empreendimento',
            url: './dashboard.html?v=2',
            height: 900,
            fullscreen: false,
            accentColor: '#7C6CF0'
          });
        }
      }];
    },

    'card-badges': function (t, options) {
      return t.card('desc').then(function (card) {
        var m = (card.desc || '').match(/peso:\s*([\d.,]+)/i);
        if (!m) return [];
        return [{ text: 'Peso ' + m[1].trim(), color: 'purple' }];
      });
    }
  }, { appKey: 'ebdf1a3d948d7b795b6ffa7ae1dd4292', appName: 'FGR Dashboard' });
</script>
</body>
</html>
